server:
  port: 8081

spring:
  datasource:
    url: jdbc:sqlite:leadnews.db        # 数据库文件生成在项目启动目录下
    driver-class-name: org.sqlite.JDBC
    # SQLite 不需要 username / password
    hikari:
      maximum-pool-size: 1              # SQLite 不支持并发写，连接池必须限制为 1
  sql:
    init:
      mode: always                      # 每次启动自动执行 schema.sql（IF NOT EXISTS 保证幂等）
  freemarker:
    template-loader-path: classpath:/templates/

# 本地文件存储（替换 MinIO）
file:
  upload-path: ./uploads                # 文件存储目录（相对于启动目录）
  access-url: http://localhost:8081/uploads  # 文件访问 URL 前缀

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl